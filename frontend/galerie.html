<style>
  .gallery-shell {
    min-height: 100vh;
    padding: 6rem 0 4rem;
  }
  .gallery-info {
    text-align: center;
    margin-bottom: 3rem;
  }
  .gallery-info h1 {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 0.5rem;
  }
  .gallery-info p {
    color: var(--text-muted);
    font-size: 1.05rem;
  }
  .gallery-meta {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .gallery-actions {
    text-align: center;
    margin: 1.5rem 0 3rem;
  }
  .gallery-images {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.85rem;
  }
  .gallery-tile {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 14px;
    background: var(--bg-card);
    cursor: pointer;
    border: 1px solid var(--line);
  }
  .gallery-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s var(--ease);
  }
  .gallery-tile:hover img {
    transform: scale(1.05);
  }
  .tile-actions {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .gallery-tile:hover .tile-actions {
    opacity: 1;
  }
  .tile-action {
    background: rgba(5, 5, 7, 0.8);
    backdrop-filter: blur(10px);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.15);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .tile-action:hover {
    background: var(--neon-cyan);
    color: #000;
  }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 7, 0.95);
    backdrop-filter: blur(14px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 2rem;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 95vw;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: var(--shadow-card);
  }
  .lb-close {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
  }
  .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 50%;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lb-prev { left: 1.25rem; }
  .lb-next { right: 1.25rem; }

  /* Password gate */
  .pw-gate {
    max-width: 420px;
    margin: 4rem auto 0;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 2.5rem;
    text-align: center;
  }
  .pw-gate h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .pw-gate p {
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    font-size: 0.95rem;
  }

  .empty-gallery {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
</style>
