<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Confetti -->
  <g>
    <rect x="40" y="40" width="8" height="14" fill="#FF6B6B" transform="rotate(20 44 47)"/>
    <rect x="100" y="25" width="8" height="14" fill="#3DA9D9" transform="rotate(-30 104 32)"/>
    <rect x="160" y="50" width="8" height="14" fill="#FFD93D" transform="rotate(45 164 57)"/>
    <rect x="240" y="20" width="8" height="14" fill="#9B59B6" transform="rotate(-15 244 27)"/>
    <rect x="310" y="40" width="8" height="14" fill="#2ECC71" transform="rotate(35 314 47)"/>
    <rect x="370" y="70" width="8" height="14" fill="#FF6B6B" transform="rotate(-20 374 77)"/>
    <circle cx="70" cy="80" r="4" fill="#FFD93D"/>
    <circle cx="200" cy="35" r="4" fill="#FF6B6B"/>
    <circle cx="290" cy="80" r="4" fill="#3DA9D9"/>
    <circle cx="350" cy="120" r="4" fill="#9B59B6"/>
    <circle cx="20" cy="120" r="4" fill="#2ECC71"/>
  </g>
  <!-- Streamers -->
  <path d="M 40 0 Q 60 30 50 60 Q 35 90 55 120" fill="none" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
  <path d="M 380 0 Q 365 30 375 60 Q 388 90 365 120" fill="none" stroke="#3DA9D9" stroke-width="3" stroke-linecap="round"/>
  <!-- Balloons -->
  <g transform="translate(80, 120)">
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#FF6B6B" stroke="#D14D5C" stroke-width="2"/>
    <path d="M 0 28 L -2 32 L 2 32 Z" fill="#D14D5C"/>
    <path d="M 0 32 Q 5 50 -3 70 Q 5 90 0 110" fill="none" stroke="#888" stroke-width="1.2"/>
    <ellipse cx="-7" cy="-10" rx="5" ry="7" fill="#FF9FB3" opacity="0.6"/>
  </g>
  <g transform="translate(330, 130)">
    <ellipse cx="0" cy="0" rx="22" ry="28" fill="#3DA9D9" stroke="#2A85AB" stroke-width="2"/>
    <path d="M 0 28 L -2 32 L 2 32 Z" fill="#2A85AB"/>
    <path d="M 0 32 Q -5 50 3 70 Q -5 90 0 110" fill="none" stroke="#888" stroke-width="1.2"/>
    <ellipse cx="-7" cy="-10" rx="5" ry="7" fill="#7FCFEC" opacity="0.6"/>
  </g>
  <g transform="translate(45, 175)">
    <ellipse cx="0" cy="0" rx="18" ry="23" fill="#FFD93D" stroke="#D9B62E" stroke-width="2"/>
    <path d="M 0 23 L -2 27 L 2 27 Z" fill="#D9B62E"/>
    <path d="M 0 27 Q 4 45 -3 60" fill="none" stroke="#888" stroke-width="1.2"/>
    <ellipse cx="-6" cy="-8" rx="4" ry="6" fill="#FFE893" opacity="0.6"/>
  </g>
  <!-- Cake -->
  <g transform="translate(200, 200)">
    <!-- Plate -->
    <ellipse cx="0" cy="60" rx="80" ry="8" fill="#E0E0E0"/>
    <!-- Cake bottom layer -->
    <rect x="-65" y="20" width="130" height="42" rx="4" fill="#F5C9D4" stroke="#D14D6E" stroke-width="2"/>
    <!-- Pink frosting drips -->
    <path d="M -65 22 Q -50 30 -35 22 Q -20 32 -5 22 Q 10 30 25 22 Q 40 32 55 22 Q 65 25 65 22" fill="#FF6B95" stroke="#D14D6E" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cake top layer -->
    <rect x="-45" y="-15" width="90" height="35" rx="3" fill="#F5C9D4" stroke="#D14D6E" stroke-width="2"/>
    <path d="M -45 -13 Q -32 -5 -20 -13 Q -8 -3 5 -13 Q 18 -5 30 -13 Q 42 -3 45 -13" fill="#FF6B95" stroke="#D14D6E" stroke-width="2" stroke-linejoin="round"/>
    <!-- Candles -->
    <g>
      <rect x="-22" y="-32" width="6" height="18" fill="#3DA9D9" stroke="#2A85AB" stroke-width="1"/>
      <rect x="-3" y="-32" width="6" height="18" fill="#FF6B6B" stroke="#D14D6E" stroke-width="1"/>
      <rect x="16" y="-32" width="6" height="18" fill="#FFD93D" stroke="#D9B62E" stroke-width="1"/>
      <!-- Flames -->
      <ellipse cx="-19" cy="-38" rx="3" ry="6" fill="#FFD93D"/>
      <ellipse cx="0" cy="-38" rx="3" ry="6" fill="#FFD93D"/>
      <ellipse cx="19" cy="-38" rx="3" ry="6" fill="#FFD93D"/>
      <ellipse cx="-19" cy="-40" rx="1.5" ry="3" fill="#FF6B6B"/>
      <ellipse cx="0" cy="-40" rx="1.5" ry="3" fill="#FF6B6B"/>
      <ellipse cx="19" cy="-40" rx="1.5" ry="3" fill="#FF6B6B"/>
    </g>
    <!-- Number 18 -->
    <text x="0" y="14" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#9B59B6">18</text>
  </g>
</svg>
